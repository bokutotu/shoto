name: shoto
version: 0.0.0.1
license: MIT
license-file: LICENSE
maintainer: mushin.hudoushin@gmail.com
author: Hikaru KONDO
synopsis: Shoto polyhedral compiler executable
category: Compilers

language: GHC2024

dependencies:
  - base >= 4.19.1.0

ghc-options: -Wall

library:
  source-dirs: src
  cpp-options:
    - -DCUDA_RUNTIME
  extra-libraries:
    - isl
    - cuda
    - nvrtc
  pkg-config-dependencies:
    - isl
  dependencies:
    - bytestring
    - directory
    - filepath
    - process
    - unix
    - containers
    - mtl
    - text
    - megaparsec
    - transformers

tests:
  shoto-test:
    main: Spec.hs
    source-dirs: test
    cpp-options:
      - -DCUDA_RUNTIME
    build-tools:
      - hspec-discover
    dependencies:
      - shoto
      - hspec
      - process
      - bytestring
      - containers
