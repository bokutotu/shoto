name: shoto
version: 0.0.0.1
license: MIT
license-file: LICENSE
maintainer: mushin.hudoushin@gmail.com
author: Hikaru KONDO
synopsis: Shoto polyhedral compiler executable
category: Compilers

language: GHC2024

flags:
  cuda-runtime:
    manual: true
    default: false

dependencies:
  - base >= 4.19.1.0

ghc-options: -Wall

library:
  source-dirs: src
  dependencies:
    - bytestring
    - directory
    - filepath
    - process
    - unix
    - containers
    - mtl
    - transformers
    - isl
  when:
    - condition: flag(cuda-runtime)
      cpp-options:
        - -DCUDA_RUNTIME
      dependencies:
        - nvidia-cuda

tests:
  shoto-test:
    main: Spec.hs
    source-dirs: test
    build-tools:
      - hspec-discover
    dependencies:
      - shoto
      - isl
      - hspec
      - process
      - bytestring
      - containers
    when:
      - condition: flag(cuda-runtime)
        cpp-options:
          - -DCUDA_RUNTIME
